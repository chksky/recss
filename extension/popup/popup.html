<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>recss</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="container">
            <header>
                <div class="logo">
                    <span class="logo-bracket">{</span>
                    <span class="logo-text">re</span>
                    <span class="logo-bracket">}</span>
                </div>
                <div class="title-block">
                    <h1>recss</h1>
                    <span class="subtitle">Custom CSS injector</span>
                </div>
            </header>

            <div class="site-card">
                <div class="site-info">
                    <span class="site-label">Current site</span>
                    <span class="site-name" id="site-name">—</span>
                </div>
                <label
                    class="toggle-switch"
                    id="toggle-label"
                    title="Enable/disable CSS for this site"
                >
                    <input type="checkbox" id="toggle" checked />
                    <span class="slider"></span>
                </label>
            </div>

            <div class="status-card" id="status-card">
                <div class="status-indicator" id="status-dot"></div>
                <span class="status-text" id="status-text">Checking…</span>
            </div>

            <div class="cache-info" id="cache-info" style="display: none">
                <span class="cache-label">Cached</span>
                <span class="cache-age" id="cache-age"></span>
            </div>

            <div class="actions">
                <button
                    class="btn btn-primary"
                    id="btn-refresh"
                    title="Clear cache and re-fetch CSS from GitHub"
                >
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    Refresh CSS
                </button>
                <a
                    class="btn btn-ghost"
                    id="btn-github"
                    href="#"
                    target="_blank"
                    title="Open your CSS file on GitHub"
                >
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                    >
                        <path
                            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
                        />
                    </svg>
                    Edit on GitHub
                </a>
            </div>

            <div class="repo-link">
                <span>github.com/chksky/recss</span>
            </div>
        </div>
        <script src="popup.js"></script>
    </body>
</html>
